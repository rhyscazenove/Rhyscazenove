<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- Row 1: 4 cards -->
  <g transform="translate(10, 10)">
    <!-- Card: 42 books -->
    <rect x="0" y="0" width="166" height="82" rx="6" fill="#f0f4ff" stroke="#e0e6f0" stroke-width="0.5"/>
    <text x="83" y="42" text-anchor="middle" font-size="30" font-weight="700" fill="#111">42</text>
    <text x="83" y="62" text-anchor="middle" font-size="11" fill="#666">books processed</text>
  </g>
  <g transform="translate(186, 10)">
    <!-- Card: 55+ episodes -->
    <rect x="0" y="0" width="166" height="82" rx="6" fill="#f0f4ff" stroke="#e0e6f0" stroke-width="0.5"/>
    <text x="83" y="42" text-anchor="middle" font-size="30" font-weight="700" fill="#111">55+</text>
    <text x="83" y="62" text-anchor="middle" font-size="11" fill="#666">podcast episodes</text>
  </g>
  <g transform="translate(362, 10)">
    <!-- Card: 2,682 segments -->
    <rect x="0" y="0" width="166" height="82" rx="6" fill="#f5f0ff" stroke="#e6e0f0" stroke-width="0.5"/>
    <text x="83" y="42" text-anchor="middle" font-size="28" font-weight="700" fill="#111">2,682</text>
    <text x="83" y="62" text-anchor="middle" font-size="11" fill="#666">audio segments</text>
  </g>
  <g transform="translate(538, 10)">
    <!-- Card: 1.4 GB audio -->
    <rect x="0" y="0" width="166" height="82" rx="6" fill="#f5f0ff" stroke="#e6e0f0" stroke-width="0.5"/>
    <text x="83" y="42" text-anchor="middle" font-size="30" font-weight="700" fill="#111">1.4 GB</text>
    <text x="83" y="62" text-anchor="middle" font-size="11" fill="#666">total audio</text>
  </g>
  <!-- Row 2: 3 cards, centered -->
  <g transform="translate(69, 102)">
    <!-- Card: ~£50 TTS cost -->
    <rect x="0" y="0" width="186" height="82" rx="6" fill="#fff8f0" stroke="#f0e6d8" stroke-width="0.5"/>
    <text x="93" y="42" text-anchor="middle" font-size="30" font-weight="700" fill="#111">~£50</text>
    <text x="93" y="62" text-anchor="middle" font-size="11" fill="#666">TTS cost</text>
  </g>
  <g transform="translate(265, 102)">
    <!-- Card: £25 purchase -->
    <rect x="0" y="0" width="186" height="82" rx="6" fill="#f0fff4" stroke="#d8f0e0" stroke-width="0.5"/>
    <text x="93" y="42" text-anchor="middle" font-size="30" font-weight="700" fill="#111">£25</text>
    <text x="93" y="62" text-anchor="middle" font-size="11" fill="#666">original purchase</text>
  </g>
  <g transform="translate(461, 102)">
    <!-- Card: 0.63s build -->
    <rect x="0" y="0" width="186" height="82" rx="6" fill="#f0fff4" stroke="#d8f0e0" stroke-width="0.5"/>
    <text x="93" y="42" text-anchor="middle" font-size="30" font-weight="700" fill="#111">0.63s</text>
    <text x="93" y="62" text-anchor="middle" font-size="11" fill="#666">build time</text>
  </g>
</svg>