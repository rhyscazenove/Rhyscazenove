<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" width="720" height="240" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Left card: V1 -->
  <rect x="8" y="8" width="340" height="224" rx="10" fill="#f4f6f8" stroke="#c8cfd6" stroke-width="1" filter="url(#shadow)"/>

  <!-- Left card header -->
  <rect x="8" y="8" width="340" height="42" rx="10" fill="#e2e7ed"/>
  <rect x="8" y="30" width="340" height="20" fill="#e2e7ed"/>

  <!-- Gear icon -->
  <g transform="translate(24, 18)" fill="#6b7a8d" opacity="0.85">
    <path d="M11 1.5l1.3 2.2c.2.1.4.2.6.2l2.5-.2.8 1.4-1.2 2.1c-.1.2-.1.4 0 .6l1.2 2.1-.8 1.4-2.5-.2c-.2 0-.4.1-.6.2L11 13.5h-1.6l-1.3-2.2c-.2-.1-.4-.2-.6-.2l-2.5.2-.8-1.4 1.2-2.1c.1-.2.1-.4 0-.6L4.2 5.1l.8-1.4 2.5.2c.2 0 .4-.1.6-.2L9.4 1.5H11zm-.8 4a2 2 0 100 4 2 2 0 000-4z"/>
  </g>

  <text x="46" y="34" fill="#3a4a5c" font-size="14" font-weight="700" letter-spacing="0.3">V1: Deterministic Python</text>

  <!-- Left card attributes -->
  <g font-size="12" fill="#111">
    <!-- Speed -->
    <text x="24" y="72"><tspan fill="#6b7a8d" font-weight="600">Speed</tspan></text>
    <text x="136" y="72">Milliseconds per book</text>

    <!-- Cost -->
    <text x="24" y="96"><tspan fill="#6b7a8d" font-weight="600">Cost</tspan></text>
    <text x="136" y="96">Zero (no API calls)</text>

    <!-- Quality -->
    <text x="24" y="120"><tspan fill="#6b7a8d" font-weight="600">Quality</tspan></text>
    <text x="136" y="120" fill="#111">Functional but patterned</text>
    <!-- Cautionary indicator -->
    <circle cx="318" cy="117" r="5" fill="#e8b84b" opacity="0.7"/>
    <text x="318" y="120.5" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">!</text>

    <!-- Consistency -->
    <text x="24" y="144"><tspan fill="#6b7a8d" font-weight="600">Consistency</tspan></text>
    <text x="136" y="144">Perfectly reproducible</text>

    <!-- Divider -->
    <line x1="24" y1="160" x2="332" y2="160" stroke="#d0d6dc" stroke-width="0.5"/>

    <!-- Trade-off -->
    <text x="24" y="180"><tspan fill="#6b7a8d" font-weight="600">Trade-off</tspan></text>
    <text x="24" y="198" font-size="11.5" fill="#6b7a8d" font-style="italic">Cycling patterns become audible</text>
    <text x="24" y="214" font-size="11.5" fill="#6b7a8d" font-style="italic">on binge-listening</text>
  </g>

  <!-- Right card: V2 -->
  <rect x="372" y="8" width="340" height="224" rx="10" fill="#f5f3f9" stroke="#c4b8d6" stroke-width="1" filter="url(#shadow)"/>

  <!-- Right card header -->
  <rect x="372" y="8" width="340" height="42" rx="10" fill="#e4ddf0"/>
  <rect x="372" y="30" width="340" height="20" fill="#e4ddf0"/>

  <!-- Sparkle icon -->
  <g transform="translate(388, 17)" fill="#7c5dab" opacity="0.85">
    <path d="M7.5 0l1.8 5.2L14.5 7l-5.2 1.8L7.5 14l-1.8-5.2L0.5 7l5.2-1.8L7.5 0z"/>
    <path d="M14.5 0l.7 2 2 .7-2 .7-.7 2-.7-2-2-.7 2-.7.7-2z" opacity="0.6"/>
  </g>

  <text x="410" y="34" fill="#5a3d7a" font-size="14" font-weight="700" letter-spacing="0.3">V2: Claude Code Skill</text>

  <!-- Right card attributes -->
  <g font-size="12" fill="#111">
    <!-- Speed -->
    <text x="388" y="72"><tspan fill="#7c6a94" font-weight="600">Speed</tspan></text>
    <text x="500" y="72">Minutes per book</text>

    <!-- Cost -->
    <text x="388" y="96"><tspan fill="#7c6a94" font-weight="600">Cost</tspan></text>
    <text x="500" y="96">API tokens</text>
    <!-- Cautionary indicator -->
    <circle cx="582" cy="93" r="5" fill="#e8b84b" opacity="0.7"/>
    <text x="582" y="96.5" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">!</text>

    <!-- Quality -->
    <text x="388" y="120"><tspan fill="#7c6a94" font-weight="600">Quality</tspan></text>
    <text x="500" y="120">Natural, opinionated dialogue</text>
    <!-- Positive indicator -->
    <circle cx="682" cy="117" r="5" fill="#4caf7c" opacity="0.8"/>
    <text x="682" y="120.5" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">&#x2713;</text>

    <!-- Consistency -->
    <text x="388" y="144"><tspan fill="#7c6a94" font-weight="600">Consistency</tspan></text>
    <text x="500" y="144">Varies between runs</text>

    <!-- Divider -->
    <line x1="388" y1="160" x2="696" y2="160" stroke="#c4b8d6" stroke-width="0.5"/>

    <!-- Trade-off -->
    <text x="388" y="180"><tspan fill="#7c6a94" font-weight="600">Trade-off</tspan></text>
    <text x="388" y="198" font-size="11.5" fill="#7c6a94" font-style="italic">Cost and speed for much</text>
    <text x="388" y="214" font-size="11.5" fill="#7c6a94" font-style="italic">better output</text>
  </g>
</svg>