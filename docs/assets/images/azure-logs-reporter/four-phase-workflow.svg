<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 450" width="720" height="450" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Phase 1: Discovery band -->
  <rect x="0" y="0" width="720" height="108" rx="0" fill="#E8F0FE" opacity="0.6"/>
  <!-- Phase 2: Data Collection band -->
  <rect x="0" y="112" width="720" height="108" rx="0" fill="#E0F5F0" opacity="0.6"/>
  <!-- Phase 3: Analysis band -->
  <rect x="0" y="224" width="720" height="108" rx="0" fill="#E6F4EA" opacity="0.6"/>
  <!-- Phase 4: Report Generation band -->
  <rect x="0" y="336" width="720" height="114" rx="0" fill="#FEF3E0" opacity="0.6"/>

  <!-- Thin divider lines -->
  <line x1="0" y1="108" x2="720" y2="108" stroke="#CBD5E1" stroke-width="0.5"/>
  <line x1="0" y1="220" x2="720" y2="220" stroke="#CBD5E1" stroke-width="0.5"/>
  <line x1="0" y1="332" x2="720" y2="332" stroke="#CBD5E1" stroke-width="0.5"/>

  <!-- Azure MCP Server vertical bar spanning phases 1-3 -->
  <rect x="16" y="14" width="52" height="310" rx="6" fill="#0078D4" opacity="0.95"/>
  <text x="42" y="105" fill="#fff" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="0.5">
    <tspan x="42" dy="0">Azure</tspan>
    <tspan x="42" dy="13">MCP</tspan>
    <tspan x="42" dy="13">Server</tspan>
  </text>
  <!-- Small connector dots from MCP bar to phases -->
  <circle cx="68" cy="54" r="3" fill="#0078D4"/>
  <circle cx="68" cy="166" r="3" fill="#0078D4"/>
  <circle cx="68" cy="278" r="3" fill="#0078D4"/>
  <line x1="68" y1="54" x2="88" y2="54" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="68" y1="166" x2="88" y2="166" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="68" y1="278" x2="88" y2="278" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ===== PHASE 1: DISCOVERY ===== -->
  <text x="96" y="28" fill="#1A56DB" font-size="13" font-weight="700" letter-spacing="0.3">PHASE 1: DISCOVERY</text>

  <!-- Box: List Workspaces -->
  <rect x="96" y="36" width="175" height="58" rx="6" fill="#fff" stroke="#4285F4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="183.5" y="58" fill="#111" font-size="11" font-weight="600" text-anchor="middle">List Workspaces</text>
  <text x="183.5" y="74" fill="#555" font-size="9.5" text-anchor="middle">az monitor log-analytics</text>
  <text x="183.5" y="86" fill="#555" font-size="9.5" text-anchor="middle">workspace list</text>

  <!-- Arrow between boxes -->
  <line x1="278" y1="65" x2="302" y2="65" stroke="#94A3B8" stroke-width="1.2" marker-end="url(#arrowGray)"/>
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0078D4"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D97706"/>
    </marker>
  </defs>

  <!-- Box: Query Usage Table -->
  <rect x="310" y="36" width="230" height="58" rx="6" fill="#fff" stroke="#4285F4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="425" y="58" fill="#111" font-size="11" font-weight="600" text-anchor="middle">Query Usage Table</text>
  <text x="425" y="74" fill="#555" font-size="9.5" text-anchor="middle">Discover tables with data;</text>
  <text x="425" y="86" fill="#555" font-size="9.5" text-anchor="middle">measure ingestion volumes</text>

  <!-- Arrow phase 1 to phase 2 -->
  <line x1="400" y1="97" x2="400" y2="130" stroke="#0078D4" stroke-width="1.2" marker-end="url(#arrowBlue)"/>

  <!-- ===== PHASE 2: DATA COLLECTION ===== -->
  <text x="96" y="140" fill="#0D7377" font-size="13" font-weight="700" letter-spacing="0.3">PHASE 2: DATA COLLECTION</text>

  <!-- Parallel queries boxes -->
  <rect x="96" y="150" width="120" height="46" rx="5" fill="#fff" stroke="#14B8A6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="156" y="169" fill="#111" font-size="10" font-weight="600" text-anchor="middle">HTTP 5xx Errors</text>
  <text x="156" y="182" fill="#555" font-size="9" text-anchor="middle">AppRequests</text>

  <rect x="224" y="150" width="120" height="46" rx="5" fill="#fff" stroke="#14B8A6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="284" y="169" fill="#111" font-size="10" font-weight="600" text-anchor="middle">404 Counts</text>
  <text x="284" y="182" fill="#555" font-size="9" text-anchor="middle">AppRequests</text>

  <rect x="352" y="150" width="120" height="46" rx="5" fill="#fff" stroke="#14B8A6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="412" y="169" fill="#111" font-size="10" font-weight="600" text-anchor="middle">Stderr by Pod</text>
  <text x="412" y="182" fill="#555" font-size="9" text-anchor="middle">ContainerLog</text>

  <rect x="480" y="150" width="120" height="46" rx="5" fill="#fff" stroke="#14B8A6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="540" y="169" fill="#111" font-size="10" font-weight="600" text-anchor="middle">K8s Events</text>
  <text x="540" y="182" fill="#555" font-size="9" text-anchor="middle">KubeEvents</text>

  <rect x="608" y="150" width="100" height="46" rx="5" fill="#fff" stroke="#14B8A6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="658" y="169" fill="#111" font-size="10" font-weight="600" text-anchor="middle">Traffic Vol.</text>
  <text x="658" y="182" fill="#555" font-size="9" text-anchor="middle">AppRequests</text>

  <!-- Parallel indicator -->
  <text x="660" y="143" fill="#0D7377" font-size="9" font-style="italic" text-anchor="end">parallel KQL queries</text>

  <!-- Arrow phase 2 to phase 3 -->
  <line x1="400" y1="200" x2="400" y2="242" stroke="#0078D4" stroke-width="1.2" marker-end="url(#arrowBlue)"/>

  <!-- ===== PHASE 3: ANALYSIS ===== -->
  <text x="96" y="252" fill="#15803D" font-size="13" font-weight="700" letter-spacing="0.3">PHASE 3: ANALYSIS</text>

  <rect x="96" y="262" width="112" height="46" rx="5" fill="#fff" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="152" y="281" fill="#111" font-size="10" font-weight="600" text-anchor="middle">Error Summary</text>
  <text x="152" y="294" fill="#555" font-size="9" text-anchor="middle">by result code</text>

  <rect x="216" y="262" width="112" height="46" rx="5" fill="#fff" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="272" y="281" fill="#111" font-size="10" font-weight="600" text-anchor="middle">Exceptions</text>
  <text x="272" y="294" fill="#555" font-size="9" text-anchor="middle">frequency &amp; type</text>

  <rect x="336" y="262" width="112" height="46" rx="5" fill="#fff" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="392" y="281" fill="#111" font-size="10" font-weight="600" text-anchor="middle">Failed Requests</text>
  <text x="392" y="294" fill="#555" font-size="9" text-anchor="middle">top operations</text>

  <rect x="456" y="262" width="122" height="46" rx="5" fill="#fff" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="517" y="281" fill="#111" font-size="10" font-weight="600" text-anchor="middle">Dependency Fails</text>
  <text x="517" y="294" fill="#555" font-size="9" text-anchor="middle">external services</text>

  <rect x="586" y="262" width="122" height="46" rx="5" fill="#fff" stroke="#22C55E" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="647" y="281" fill="#111" font-size="10" font-weight="600" text-anchor="middle">Activity Anomalies</text>
  <text x="647" y="294" fill="#555" font-size="9" text-anchor="middle">spike detection</text>

  <!-- Deeper queries label -->
  <text x="660" y="255" fill="#15803D" font-size="9" font-style="italic" text-anchor="end">deeper analytical queries</text>

  <!-- Arrow phase 3 to phase 4 -->
  <line x1="400" y1="312" x2="400" y2="348" stroke="#D97706" stroke-width="1.2" marker-end="url(#arrowAmber)"/>

  <!-- ===== PHASE 4: REPORT GENERATION ===== -->
  <text x="96" y="362" fill="#B45309" font-size="13" font-weight="700" letter-spacing="0.3">PHASE 4: REPORT GENERATION</text>

  <!-- Output box - highlighted -->
  <rect x="96" y="372" width="610" height="62" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="2" filter="url(#shadow)"/>

  <!-- Report contents -->
  <rect x="112" y="382" width="130" height="40" rx="4" fill="#fff" stroke="#F59E0B" stroke-width="1"/>
  <text x="177" y="398" fill="#111" font-size="10" font-weight="600" text-anchor="middle">Executive Summary</text>
  <text x="177" y="411" fill="#555" font-size="9" text-anchor="middle">overall health status</text>

  <rect x="252" y="382" width="130" height="40" rx="4" fill="#fff" stroke="#F59E0B" stroke-width="1"/>
  <text x="317" y="398" fill="#111" font-size="10" font-weight="600" text-anchor="middle">Classified Findings</text>
  <text x="317" y="411" fill="#555" font-size="9" text-anchor="middle">critical / warning / info</text>

  <rect x="392" y="382" width="130" height="40" rx="4" fill="#fff" stroke="#F59E0B" stroke-width="1"/>
  <text x="457" y="398" fill="#111" font-size="10" font-weight="600" text-anchor="middle">Metrics Table</text>
  <text x="457" y="411" fill="#555" font-size="9" text-anchor="middle">counts &amp; trends</text>

  <rect x="532" y="382" width="160" height="40" rx="4" fill="#fff" stroke="#F59E0B" stroke-width="1"/>
  <text x="612" y="398" fill="#111" font-size="10" font-weight="600" text-anchor="middle">Recommendations</text>
  <text x="612" y="411" fill="#555" font-size="9" text-anchor="middle">+ Azure Portal links</text>

  <!-- Structured Markdown Report label -->
  <text x="700" y="443" fill="#92400E" font-size="9" font-weight="600" text-anchor="end">Structured Markdown Report</text>

  <!-- Small "no MCP" indicator for phase 4 -->
  <text x="42" y="396" fill="#94A3B8" font-size="9" text-anchor="middle" font-style="italic">local</text>
  <text x="42" y="408" fill="#94A3B8" font-size="9" text-anchor="middle" font-style="italic">output</text>
</svg>