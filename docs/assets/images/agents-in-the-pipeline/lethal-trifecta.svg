<svg xmlns="http://www.w3.org/2000/svg" width="720" height="450" viewBox="0 0 720 450">
  <defs>
    <style>
      .label { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 15px; fill: #111; font-weight: 600; }
      .caption { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13.5px; fill: #555; font-style: italic; }
      .risk-label { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; fill: #fff; font-weight: 700; letter-spacing: 0.5px; }
    </style>
  </defs>

  <!-- Circle 1: Access to Private Data (top) -->
  <circle cx="360" cy="165" r="130" fill="rgba(41, 98, 168, 0.16)" stroke="rgba(41, 98, 168, 0.5)" stroke-width="1.5"/>

  <!-- Circle 2: Untrusted Content (bottom-left) -->
  <circle cx="285" cy="255" r="130" fill="rgba(46, 139, 87, 0.16)" stroke="rgba(46, 139, 87, 0.5)" stroke-width="1.5"/>

  <!-- Circle 3: Exfiltration Mechanism (bottom-right) -->
  <circle cx="435" cy="255" r="130" fill="rgba(196, 150, 30, 0.16)" stroke="rgba(196, 150, 30, 0.5)" stroke-width="1.5"/>

  <!-- Centre risk zone highlight -->
  <!-- This is the triple-overlap region, approximated with a clipped shape -->
  <clipPath id="clip-c2">
    <circle cx="285" cy="255" r="130"/>
  </clipPath>
  <clipPath id="clip-c3">
    <circle cx="435" cy="255" r="130"/>
  </clipPath>
  <g clip-path="url(#clip-c2)">
    <g clip-path="url(#clip-c3)">
      <circle cx="360" cy="165" r="130" fill="rgba(190, 50, 50, 0.55)"/>
    </g>
  </g>

  <!-- Labels positioned outside the circles -->
  <!-- Top label: Access to Private Data -->
  <text x="360" y="52" text-anchor="middle" class="label">Access to Private Data</text>

  <!-- Bottom-left label: Untrusted Content -->
  <text x="172" y="370" text-anchor="middle" class="label">Untrusted Content</text>

  <!-- Bottom-right label: Exfiltration Mechanism -->
  <text x="548" y="370" text-anchor="middle" class="label">Exfiltration Mechanism</text>

  <!-- Risk Zone label in centre -->
  <text x="360" y="226" text-anchor="middle" class="risk-label">RISK ZONE</text>

  <!-- Caption -->
  <text x="360" y="425" text-anchor="middle" class="caption">Any one alone is manageable. All three together is the problem.</text>
</svg>