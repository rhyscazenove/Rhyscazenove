<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280" fill="none">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#999"/>
    </marker>
  </defs>

  <!-- === Entry Point 1: CLI (teal) === -->
  <rect x="30" y="16" width="190" height="90" rx="8" ry="8" fill="#eef7f7" stroke="#3a9a9a" stroke-width="1.5"/>
  <!-- Terminal icon -->
  <g transform="translate(50, 32)">
    <rect width="24" height="18" rx="3" ry="3" fill="none" stroke="#3a9a9a" stroke-width="1.5"/>
    <polyline points="5,7 9,10 5,13" fill="none" stroke="#3a9a9a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="12" y1="13" x2="18" y2="13" stroke="#3a9a9a" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="82" y="45" font-family="sans-serif" font-size="14" font-weight="600" fill="#111">CLI</text>
  <text x="50" y="68" font-family="sans-serif" font-size="10.5" fill="#666">main.py with Click + Rich</text>
  <text x="50" y="82" font-family="sans-serif" font-size="10.5" fill="#666">For developers and cron jobs</text>

  <!-- === Entry Point 2: Web UI (green) === -->
  <rect x="265" y="16" width="190" height="90" rx="8" ry="8" fill="#f0f8f0" stroke="#4a8a4a" stroke-width="1.5"/>
  <!-- Browser icon -->
  <g transform="translate(285, 30)">
    <rect width="24" height="20" rx="3" ry="3" fill="none" stroke="#4a8a4a" stroke-width="1.5"/>
    <line x1="0" y1="8" x2="24" y2="8" stroke="#4a8a4a" stroke-width="1.5"/>
    <circle cx="4.5" cy="4.5" r="1.2" fill="#4a8a4a"/>
    <circle cx="9" cy="4.5" r="1.2" fill="#4a8a4a"/>
    <circle cx="13.5" cy="4.5" r="1.2" fill="#4a8a4a"/>
  </g>
  <text x="317" y="45" font-family="sans-serif" font-size="14" font-weight="600" fill="#111">Web UI</text>
  <text x="285" y="68" font-family="sans-serif" font-size="10.5" fill="#666">Flask + SocketIO live progress</text>
  <text x="285" y="82" font-family="sans-serif" font-size="10.5" fill="#666">For project managers</text>

  <!-- === Entry Point 3: Production (amber) === -->
  <rect x="500" y="16" width="190" height="90" rx="8" ry="8" fill="#fdf6eb" stroke="#c08a30" stroke-width="1.5"/>
  <!-- Cloud icon -->
  <g transform="translate(520, 30)">
    <path d="M6,18 Q0,18 0,14 Q0,10 4,10 Q4,5 10,5 Q16,5 17,9 Q22,9 22,13 Q22,18 17,18 Z" fill="none" stroke="#c08a30" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  <text x="552" y="45" font-family="sans-serif" font-size="14" font-weight="600" fill="#111">Production</text>
  <text x="520" y="68" font-family="sans-serif" font-size="10.5" fill="#666">Fly.io with Flask-Login auth</text>
  <text x="520" y="82" font-family="sans-serif" font-size="10.5" fill="#666">Deployed application</text>

  <!-- === Converging arrows === -->
  <!-- CLI arrow: from bottom-center of box 1 down and right to pipeline -->
  <line x1="125" y1="106" x2="125" y2="140" stroke="#999" stroke-width="1.5"/>
  <line x1="125" y1="140" x2="310" y2="175" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Web UI arrow: straight down from box 2 to pipeline -->
  <line x1="360" y1="106" x2="360" y2="175" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Production arrow: from bottom-center of box 3 down and left to pipeline -->
  <line x1="595" y1="106" x2="595" y2="140" stroke="#999" stroke-width="1.5"/>
  <line x1="595" y1="140" x2="410" y2="175" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- === Shared Pipeline bar === -->
  <rect x="80" y="180" width="560" height="68" rx="8" ry="8" fill="#fff" stroke="#b0b0b0" stroke-width="1.5"/>

  <!-- Label: "Shared Pipeline" -->
  <text x="360" y="198" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#999" letter-spacing="1">SHARED PIPELINE</text>

  <!-- Pipeline component 1: JiraClient -->
  <rect x="100" y="208" width="148" height="30" rx="6" ry="6" fill="#f5f5f5" stroke="#4a7c8a" stroke-width="1.2"/>
  <text x="174" y="228" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="600" fill="#111">JiraClient</text>

  <!-- Arrow between pipeline stages -->
  <line x1="253" y1="223" x2="278" y2="223" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pipeline component 2: DataProcessor -->
  <rect x="283" y="208" width="148" height="30" rx="6" ry="6" fill="#f5f5f5" stroke="#4a7c8a" stroke-width="1.2"/>
  <text x="357" y="228" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="600" fill="#111">DataProcessor</text>

  <!-- Arrow between pipeline stages -->
  <line x1="436" y1="223" x2="461" y2="223" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pipeline component 3: ReportGenerator -->
  <rect x="466" y="208" width="154" height="30" rx="6" ry="6" fill="#f5f5f5" stroke="#4a7c8a" stroke-width="1.2"/>
  <text x="543" y="228" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="600" fill="#111">ReportGenerator</text>

  <!-- Tagline -->
  <text x="360" y="270" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999" font-style="italic">The entry point changes, but the data flow doesn't.</text>
</svg>