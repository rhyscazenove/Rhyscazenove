<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -6 720 526" width="720" height="526" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" class="diagram" role="img" aria-label="Mapping of nine research sources to eleven skill components, showing which sources informed each design decision">
