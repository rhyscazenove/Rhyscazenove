<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" class="diagram" role="img" aria-label="NeoReader CSS support matrix showing reliably supported properties on the left and unreliable or unsupported properties on the right">
  <style>
    /* Panel backgrounds */
    rect[fill="#f0fdf4"] { fill: var(--svg-panel, #f0fdf4); }
    rect[fill="#fef2f2"] { fill: var(--svg-panel, #fef2f2); }
  </style>

  <!-- Left panel: Reliably Supported -->
  <rect x="8" y="8" width="344" height="316" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <rect x="8" y="8" width="4" height="316" rx="2" fill="#16a34a"/>

  <!-- Left panel header -->
  <rect x="8" y="8" width="344" height="36" rx="6" fill="#16a34a"/>
  <rect x="8" y="30" width="344" height="14" fill="#16a34a"/>
  <text x="40" y="32" font-size="14" font-weight="600" fill="#fff">Reliably Supported</text>
  <!-- Checkmark icon -->
  <circle cx="26" cy="27" r="9" fill="none" stroke="#fff" stroke-width="1.5"/>
  <polyline points="21,27 25,31 32,23" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left panel items -->
  <text x="24" y="68" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#15803d">font-size, font-weight, font-style, font-family</text>
  <text x="24" y="90" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#15803d">margin, padding (% and em units)</text>
  <text x="24" y="112" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#15803d">border, border-left</text>
  <text x="24" y="134" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#15803d">white-space: pre-wrap</text>
  <text x="24" y="156" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#15803d">text-align, text-indent</text>
  <text x="24" y="178" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#15803d">color (greyscale values)</text>
  <text x="24" y="200" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#15803d">page-break-before/after</text>
  <text x="24" y="222" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#15803d">orphans, widows</text>
  <text x="24" y="244" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#15803d">@font-face (embedded fonts)</text>

  <!-- Right panel: Unreliable / Unsupported -->
  <rect x="368" y="8" width="344" height="316" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <rect x="368" y="8" width="4" height="316" rx="2" fill="#dc2626"/>

  <!-- Right panel header -->
  <rect x="368" y="8" width="344" height="36" rx="6" fill="#dc2626"/>
  <rect x="368" y="30" width="344" height="14" fill="#dc2626"/>
  <text x="400" y="32" font-size="14" font-weight="600" fill="#fff">Unreliable / Unsupported</text>
  <!-- X icon -->
  <circle cx="386" cy="27" r="9" fill="none" stroke="#fff" stroke-width="1.5"/>
  <line x1="382" y1="23" x2="390" y2="31" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="390" y1="23" x2="382" y2="31" stroke="#fff" stroke-width="2" stroke-linecap="round"/>

  <!-- Right panel items -->
  <text x="384" y="68" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#991b1b">flexbox</text>
  <text x="384" y="90" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#991b1b">grid</text>
  <text x="384" y="112" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#991b1b">float</text>
  <text x="384" y="134" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#991b1b">calc()</text>
  <text x="384" y="156" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#991b1b">media queries</text>
  <text x="384" y="178" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#991b1b">visibility: hidden</text>
  <text x="384" y="200" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#991b1b">pseudo-elements (::before, ::after)</text>
  <text x="384" y="222" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#991b1b">position: absolute/fixed</text>
  <text x="384" y="244" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#991b1b">max-width, min-width</text>
  <text x="384" y="266" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#991b1b">overflow: scroll</text>

  <!-- Footer note -->
  <text x="360" y="348" font-size="11" fill="#6b7280" text-anchor="middle" font-style="italic">Based on NeoReader V2 engine. V1 has additional limitations.</text>

</svg>
