<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" width="720" height="480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" fill="#111" class="diagram" role="img" aria-label="Three-stage conversion pipeline: Mermaid pre-rendering, font embedding, and Pandoc conversion to EPUB3">
  <style>
    rect[fill="#fff"] { fill: var(--svg-card, #fff); }
    [fill="#f0f7f2"] { fill: var(--svg-panel, #f0f7f2); }
    [fill="#fff8ee"] { fill: var(--svg-panel, #fff8ee); }
    [fill="#dce8f7"] { fill: var(--svg-panel, #dce8f7); }
    [fill="#e8f0fe"] { fill: var(--svg-panel, #e8f0fe); }
    [fill="#e6f5ea"] { fill: var(--svg-panel, #e6f5ea); }
    [fill="#fff3e0"] { fill: var(--svg-panel, #fff3e0); }
    [fill="#d4edda"] { fill: var(--svg-panel, #d4edda); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3a8a5c"/>
    </marker>
  </defs>

  <!-- Stage 1 background band -->
  <rect x="0" y="0" width="720" height="190" rx="0" fill="#e8f0fe" opacity="0.45"/>
  <!-- Stage 2 background band -->
  <rect x="0" y="190" width="720" height="110" rx="0" fill="#e6f5ea" opacity="0.45"/>
  <!-- Stage 3 background band -->
  <rect x="0" y="300" width="720" height="180" rx="0" fill="#fff3e0" opacity="0.45"/>

  <!-- Stage labels -->
  <text x="18" y="28" font-size="11" font-weight="700" fill="#4a6fa5" letter-spacing="0.5">STAGE 1</text>
  <text x="18" y="42" font-size="9.5" fill="#6889b5">Mermaid Pre-rendering</text>

  <text x="18" y="218" font-size="11" font-weight="700" fill="#3a7d5c" letter-spacing="0.5">STAGE 2</text>
  <text x="18" y="232" font-size="9.5" fill="#5a9a7a">Font Embedding</text>

  <text x="18" y="328" font-size="11" font-weight="700" fill="#b8860b" letter-spacing="0.5">STAGE 3</text>
  <text x="18" y="342" font-size="9.5" fill="#c49a2a">Pandoc Conversion</text>

  <!-- ============ STAGE 1 ============ -->

  <!-- Markdown Source box -->
  <rect x="270" y="14" width="180" height="36" rx="8" fill="#fff" stroke="#5b8bd4" stroke-width="1.8"/>
  <text x="360" y="37" text-anchor="middle" font-size="13" font-weight="600">Markdown Source</text>

  <!-- Arrow: Source -> Diamond -->
  <line x1="360" y1="50" x2="360" y2="72" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Decision diamond: Contains Mermaid? -->
  <polygon points="360,75 440,112 360,149 280,112" fill="#dce8f7" stroke="#5b8bd4" stroke-width="1.8"/>
  <text x="360" y="109" text-anchor="middle" font-size="11" font-weight="600">Mermaid</text>
  <text x="360" y="121" text-anchor="middle" font-size="11" font-weight="600">blocks?</text>

  <!-- YES branch (left) -->
  <text x="268" y="107" text-anchor="end" font-size="10" fill="#3a7d44" font-weight="600">Yes</text>
  <line x1="280" y1="112" x2="195" y2="112" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Render to PNG box -->
  <rect x="30" y="88" width="165" height="48" rx="8" fill="#fff" stroke="#5b8bd4" stroke-width="1.8"/>
  <text x="112" y="107" text-anchor="middle" font-size="11.5" font-weight="600">Render to PNG</text>
  <text x="112" y="122" text-anchor="middle" font-size="9.5" fill="#555">mmdc -b white -w 2000</text>

  <!-- Arrow: Render -> Replace -->
  <line x1="112" y1="136" x2="112" y2="152" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Replace blocks box -->
  <rect x="30" y="155" width="165" height="30" rx="8" fill="#fff" stroke="#5b8bd4" stroke-width="1.8"/>
  <text x="112" y="175" text-anchor="middle" font-size="11" font-weight="600">Replace with img refs</text>

  <!-- Arrow: Replace -> merge point (down and right to stage 2) -->
  <path d="M 112 185 L 112 200 Q 112 210 122 210 L 348 210" stroke="#555" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

  <!-- NO branch (right) -->
  <text x="452" y="107" font-size="10" fill="#888" font-weight="600">No</text>
  <line x1="440" y1="112" x2="500" y2="112" stroke="#555" stroke-width="1.4"/>
  <!-- Curve down to stage 2 merge point -->
  <path d="M 500 112 Q 510 112 510 122 L 510 210 Q 510 210 500 210 L 372 210" stroke="#555" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

  <!-- ============ STAGE 2 ============ -->

  <!-- Download JetBrains Mono box -->
  <rect x="256" y="200" width="208" height="44" rx="8" fill="#fff" stroke="#3a8a5c" stroke-width="1.8"/>
  <text x="360" y="218" text-anchor="middle" font-size="12" font-weight="600">Download JetBrains Mono</text>
  <text x="360" y="233" text-anchor="middle" font-size="9.5" fill="#555">cached: ~/.cache/boox-epub-fonts/</text>

  <!-- Fallback note (to the right) -->
  <rect x="510" y="204" width="180" height="36" rx="6" fill="#f0f7f2" stroke="#3a8a5c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="600" y="220" text-anchor="middle" font-size="9.5" fill="#3a7d5c" font-style="italic">Fallback: NeoReader's</text>
  <text x="600" y="232" text-anchor="middle" font-size="9.5" fill="#3a7d5c" font-style="italic">built-in monospace font</text>
  <line x1="464" y1="222" x2="508" y2="222" stroke="#3a8a5c" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow: Stage 2 -> Stage 3 -->
  <line x1="360" y1="244" x2="360" y2="270" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ============ STAGE 3 ============ -->

  <!-- Pandoc box -->
  <rect x="246" y="273" width="228" height="48" rx="8" fill="#fff" stroke="#c49a2a" stroke-width="1.8"/>
  <text x="360" y="293" text-anchor="middle" font-size="12" font-weight="600">Pandoc Conversion</text>
  <text x="360" y="307" text-anchor="middle" font-size="9.5" fill="#555">--syntax-highlighting=monochrome</text>

  <!-- CSS stylesheet note (to the left) -->
  <rect x="30" y="279" width="170" height="36" rx="6" fill="#fff8ee" stroke="#c49a2a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="115" y="295" text-anchor="middle" font-size="10" fill="#9a7a1a" font-style="italic">Custom stylesheet</text>
  <text x="115" y="307" text-anchor="middle" font-size="10" fill="#9a7a1a" font-weight="600">epub-eink.css</text>
  <line x1="200" y1="297" x2="244" y2="297" stroke="#c49a2a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow: Pandoc -> Output -->
  <line x1="360" y1="321" x2="360" y2="350" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- EPUB3 Output (highlighted) -->
  <rect x="280" y="353" width="160" height="42" rx="10" fill="#d4edda" stroke="#28a745" stroke-width="2.4"/>
  <text x="360" y="372" text-anchor="middle" font-size="14" font-weight="700" fill="#1a6b2d">EPUB3</text>
  <text x="360" y="387" text-anchor="middle" font-size="10" fill="#2d7a42">Output file</text>

</svg>