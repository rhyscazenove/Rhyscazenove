<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400" class="diagram" role="img" aria-label="Three pillars of a production agent: guardrails, confinement, and observability, supported by a shared framework">
  <defs>
    <linearGradient id="pillar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7c8a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#3d6872" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="pillar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a8a7a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#4d7568" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="pillar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a8a9a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#5b7785" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <style>
    [fill="#d4d4d0"] { fill: var(--svg-panel, #d4d4d0); }
    rect[fill="#2a2a2a"] { fill: #2a2a2a; }
  </style>

  <!-- Base / Framework platform -->
  <rect x="40" y="340" width="640" height="40" rx="4" fill="#d4d4d0" stroke="#bbb" stroke-width="1"/>
  <text x="360" y="366" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#555" letter-spacing="0.08em">FRAMEWORK</text>

  <!-- Pillar 1: Guardrails -->
  <rect x="80" y="110" width="160" height="230" rx="3" fill="url(#pillar1)" stroke="#3d6872" stroke-width="1"/>
  <!-- Pillar 1 cap -->
  <rect x="72" y="100" width="176" height="18" rx="3" fill="#4a7c8a" stroke="#3d6872" stroke-width="1"/>

  <!-- Pillar 2: Confinement -->
  <rect x="280" y="110" width="160" height="230" rx="3" fill="url(#pillar2)" stroke="#4d7568" stroke-width="1"/>
  <!-- Pillar 2 cap -->
  <rect x="272" y="100" width="176" height="18" rx="3" fill="#5a8a7a" stroke="#4d7568" stroke-width="1"/>

  <!-- Pillar 3: Observability -->
  <rect x="480" y="110" width="160" height="230" rx="3" fill="url(#pillar3)" stroke="#5b7785" stroke-width="1"/>
  <!-- Pillar 3 cap -->
  <rect x="472" y="100" width="176" height="18" rx="3" fill="#6a8a9a" stroke="#5b7785" stroke-width="1"/>

  <!-- Subtle vertical lines on pillars for architectural detail -->
  <line x1="120" y1="118" x2="120" y2="335" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="200" y1="118" x2="200" y2="335" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="320" y1="118" x2="320" y2="335" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="400" y1="118" x2="400" y2="335" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="520" y1="118" x2="520" y2="335" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="600" y1="118" x2="600" y2="335" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Top bar: Production Agent -->
  <rect x="40" y="52" width="640" height="40" rx="4" fill="#2a2a2a" stroke="#444" stroke-width="1"/>
  <text x="360" y="78" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="600" fill="#f0f0ee" letter-spacing="0.06em">PRODUCTION AGENT</text>

  <!-- Pillar labels -->
  <!-- Guardrails -->
  <text x="160" y="170" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#ffffff">Guardrails</text>
  <text x="160" y="192" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.75">Constrain runtime actions</text>

  <!-- Confinement -->
  <text x="360" y="170" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#ffffff">Confinement</text>
  <text x="360" y="192" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.75">Isolated, reproducible env</text>

  <!-- Observability -->
  <text x="560" y="170" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#ffffff">Observability</text>
  <text x="560" y="192" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.75">Visibility into every action</text>

  <!-- Subtle icons/symbols on each pillar -->
  <!-- Guardrails: shield outline -->
  <g transform="translate(160, 260)" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0,-18 L14,-10 L14,4 C14,14 0,22 0,22 C0,22 -14,14 -14,4 L-14,-10 Z"/>
    <polyline points="-5,0 -1,5 7,-4"/>
  </g>

  <!-- Confinement: box/container outline -->
  <g transform="translate(360, 260)" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-16" y="-14" width="32" height="28" rx="2"/>
    <line x1="-16" y1="-6" x2="16" y2="-6"/>
    <circle cx="0" cy="4" r="3"/>
  </g>

  <!-- Observability: eye outline -->
  <g transform="translate(560, 260)" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-18,0 C-18,0 -9,-12 0,-12 C9,-12 18,0 18,0 C18,0 9,12 0,12 C-9,12 -18,0 -18,0 Z"/>
    <circle cx="0" cy="0" r="5"/>
  </g>

  <!-- Thin connection lines from top bar to pillar caps -->
  <line x1="160" y1="92" x2="160" y2="100" stroke="#888" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="360" y1="92" x2="360" y2="100" stroke="#888" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="560" y1="92" x2="560" y2="100" stroke="#888" stroke-width="1" stroke-opacity="0.5"/>
</svg>