<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" fill="none" class="diagram" role="img" aria-label="Three agent use cases: documentation generator, onboarding generator, and incident analysis, sharing a common harness">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    [fill="#f8f8f6"] { fill: var(--svg-panel, #f8f8f6); }
    [fill="#f0f0ee"] { fill: var(--svg-panel, #f0f0ee); }
    [fill="#e8f0f2"] { fill: var(--svg-panel, #e8f0f2); }
    [fill="#e8f2ec"] { fill: var(--svg-panel, #e8f2ec); }
    [fill="#f2ece4"] { fill: var(--svg-panel, #f2ece4); }
  </style>

  <!-- Card 1: Documentation Generator -->
  <g transform="translate(16, 12)">
    <rect x="0" y="0" width="216" height="208" rx="8" fill="#f8f8f6" stroke="#ddd" stroke-width="1"/>

    <!-- Document icon -->
    <g transform="translate(88, 20)">
      <rect x="0" y="0" width="30" height="38" rx="2" fill="none" stroke="#4a7c8a" stroke-width="2"/>
      <polyline points="20,0 20,10 30,10" fill="none" stroke="#4a7c8a" stroke-width="2"/>
      <line x1="7" y1="18" x2="23" y2="18" stroke="#4a7c8a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="7" y1="23" x2="23" y2="23" stroke="#4a7c8a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="7" y1="28" x2="18" y2="28" stroke="#4a7c8a" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Title -->
    <text x="108" y="82" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Documentation</text>
    <text x="108" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Generator</text>

    <!-- Description -->
    <text x="108" y="122" text-anchor="middle" font-size="11" fill="#555">Scans git history, groups</text>
    <text x="108" y="136" text-anchor="middle" font-size="11" fill="#555">changes by theme, generates</text>
    <text x="108" y="150" text-anchor="middle" font-size="11" fill="#555">ADRs and architecture diagrams.</text>

    <!-- Trigger badge -->
    <rect x="64" y="168" width="88" height="24" rx="12" fill="#e8f0f2" stroke="#c0d4da" stroke-width="0.5"/>
    <text x="108" y="184" text-anchor="middle" font-size="11" font-weight="500" fill="#4a7c8a">On merge</text>
  </g>

  <!-- Card 2: Onboarding Generator -->
  <g transform="translate(252, 12)">
    <rect x="0" y="0" width="216" height="208" rx="8" fill="#f8f8f6" stroke="#ddd" stroke-width="1"/>

    <!-- Person with arrow icon -->
    <g transform="translate(88, 20)">
      <circle cx="12" cy="8" r="7" fill="none" stroke="#5a8a7a" stroke-width="2"/>
      <path d="M0,32 Q0,20 12,20 Q24,20 24,32" fill="none" stroke="#5a8a7a" stroke-width="2"/>
      <line x1="28" y1="18" x2="38" y2="18" stroke="#5a8a7a" stroke-width="2" stroke-linecap="round"/>
      <polyline points="34,13 39,18 34,23" fill="none" stroke="#5a8a7a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Title -->
    <text x="108" y="82" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Onboarding</text>
    <text x="108" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Generator</text>

    <!-- Description -->
    <text x="108" y="122" text-anchor="middle" font-size="11" fill="#555">Creates full developer onboarding</text>
    <text x="108" y="136" text-anchor="middle" font-size="11" fill="#555">docs: overview, architecture,</text>
    <text x="108" y="150" text-anchor="middle" font-size="11" fill="#555">getting-started, troubleshooting.</text>

    <!-- Trigger badge -->
    <rect x="60" y="168" width="96" height="24" rx="12" fill="#e8f2ec" stroke="#b8d4c6" stroke-width="0.5"/>
    <text x="108" y="184" text-anchor="middle" font-size="11" font-weight="500" fill="#5a8a7a">On demand</text>
  </g>

  <!-- Card 3: Incident Analysis -->
  <g transform="translate(488, 12)">
    <rect x="0" y="0" width="216" height="208" rx="8" fill="#f8f8f6" stroke="#ddd" stroke-width="1"/>

    <!-- Warning triangle icon -->
    <g transform="translate(88, 18)">
      <path d="M18,2 L34,34 L2,34 Z" fill="none" stroke="#8a6a4a" stroke-width="2" stroke-linejoin="round"/>
      <line x1="18" y1="14" x2="18" y2="24" stroke="#8a6a4a" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="18" cy="29" r="1.5" fill="#8a6a4a"/>
    </g>

    <!-- Title -->
    <text x="108" y="82" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Incident</text>
    <text x="108" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Analysis</text>

    <!-- Description -->
    <text x="108" y="122" text-anchor="middle" font-size="11" fill="#555">Fires on error rate threshold,</text>
    <text x="108" y="136" text-anchor="middle" font-size="11" fill="#555">uses Azure MCP to analyse</text>
    <text x="108" y="150" text-anchor="middle" font-size="11" fill="#555">and prepare evidence with links.</text>

    <!-- Trigger badge -->
    <rect x="64" y="168" width="88" height="24" rx="12" fill="#f2ece4" stroke="#d4c4b0" stroke-width="0.5"/>
    <text x="108" y="184" text-anchor="middle" font-size="11" font-weight="500" fill="#8a6a4a">Webhook</text>
  </g>

  <!-- Shared harness bar -->
  <g transform="translate(16, 240)">
    <!-- Connecting lines from cards to bar -->
    <line x1="108" y1="-20" x2="108" y2="0" stroke="#bbb" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="344" y1="-20" x2="344" y2="0" stroke="#bbb" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="580" y1="-20" x2="580" y2="0" stroke="#bbb" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- Bar -->
    <rect x="0" y="0" width="688" height="40" rx="6" fill="#f0f0ee" stroke="#ccc" stroke-width="1"/>

    <!-- Bar label -->
    <text x="344" y="25" text-anchor="middle" font-size="13" font-weight="500" fill="#444">Same harness: hooks + container + pipeline</text>
  </g>
</svg>
