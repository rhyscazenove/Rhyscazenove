<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" class="diagram" role="img" aria-label="Two-phase prompting flow: phase 1 sends team activity report, template, and JSON schema to Claude API producing validated JSON; phase 2 sends that JSON with a report template to Claude API producing a markdown report">
  <style>
    /* Input panel backgrounds */
    rect[fill="#f4f5f7"] { fill: var(--svg-panel, #f4f5f7); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666" />
    </marker>
  </defs>

  <!-- Phase 1 -->
  <text x="18" y="80" font-family="sans-serif" font-size="14" font-weight="bold" fill="#111" text-anchor="middle">Phase</text>
  <text x="18" y="97" font-family="sans-serif" font-size="14" font-weight="bold" fill="#111" text-anchor="middle">1</text>

  <!-- Phase 1 input boxes -->
  <rect x="50" y="30" width="130" height="34" rx="5" fill="#f4f5f7" stroke="#c0c4cc" stroke-width="1.2" />
  <text x="115" y="52" font-family="sans-serif" font-size="11" fill="#111" text-anchor="middle">team-activity-report</text>

  <rect x="50" y="74" width="130" height="34" rx="5" fill="#f4f5f7" stroke="#c0c4cc" stroke-width="1.2" />
  <text x="115" y="96" font-family="sans-serif" font-size="11" fill="#111" text-anchor="middle">Report Template</text>

  <rect x="50" y="118" width="130" height="34" rx="5" fill="#f4f5f7" stroke="#c0c4cc" stroke-width="1.2" />
  <text x="115" y="140" font-family="sans-serif" font-size="11" fill="#111" text-anchor="middle">JSON Schema</text>

  <!-- Phase 1 arrows to Claude API -->
  <line x1="180" y1="47" x2="310" y2="85" stroke="#666" stroke-width="1.3" marker-end="url(#arrowhead)" />
  <line x1="180" y1="91" x2="310" y2="91" stroke="#666" stroke-width="1.3" marker-end="url(#arrowhead)" />
  <line x1="180" y1="135" x2="310" y2="97" stroke="#666" stroke-width="1.3" marker-end="url(#arrowhead)" />

  <!-- Phase 1 Claude API box -->
  <rect x="320" y="68" width="140" height="46" rx="6" fill="#e8e0f0" stroke="#9b8ab8" stroke-width="1.4" />
  <text x="390" y="96" font-family="sans-serif" font-size="13" font-weight="600" fill="#111" text-anchor="middle">Claude API</text>

  <!-- Phase 1 arrow to output -->
  <line x1="460" y1="91" x2="540" y2="91" stroke="#666" stroke-width="1.3" marker-end="url(#arrowhead)" />

  <!-- Phase 1 output box -->
  <rect x="550" y="68" width="145" height="46" rx="6" fill="#dff0df" stroke="#8db88d" stroke-width="1.4" />
  <text x="622" y="96" font-family="sans-serif" font-size="12" font-weight="600" fill="#111" text-anchor="middle">Validated JSON</text>

  <!-- Vertical connection from Phase 1 output to Phase 2 input -->
  <line x1="622" y1="114" x2="622" y2="168" stroke="#666" stroke-width="1.3" stroke-dasharray="5,3" />
  <line x1="622" y1="168" x2="180" y2="228" stroke="#666" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrowhead)" />

  <!-- Phase 2 -->
  <text x="18" y="240" font-family="sans-serif" font-size="14" font-weight="bold" fill="#111" text-anchor="middle">Phase</text>
  <text x="18" y="257" font-family="sans-serif" font-size="14" font-weight="bold" fill="#111" text-anchor="middle">2</text>

  <!-- Phase 2 input boxes -->
  <rect x="50" y="207" width="130" height="34" rx="5" fill="#f4f5f7" stroke="#c0c4cc" stroke-width="1.2" />
  <text x="115" y="229" font-family="sans-serif" font-size="11" fill="#111" text-anchor="middle">Phase 1 JSON</text>

  <rect x="50" y="251" width="130" height="34" rx="5" fill="#f4f5f7" stroke="#c0c4cc" stroke-width="1.2" />
  <text x="115" y="273" font-family="sans-serif" font-size="11" fill="#111" text-anchor="middle">Report Template</text>

  <!-- Phase 2 arrows to Claude API -->
  <line x1="180" y1="224" x2="310" y2="248" stroke="#666" stroke-width="1.3" marker-end="url(#arrowhead)" />
  <line x1="180" y1="268" x2="310" y2="254" stroke="#666" stroke-width="1.3" marker-end="url(#arrowhead)" />

  <!-- Phase 2 Claude API box -->
  <rect x="320" y="228" width="140" height="46" rx="6" fill="#e8e0f0" stroke="#9b8ab8" stroke-width="1.4" />
  <text x="390" y="256" font-family="sans-serif" font-size="13" font-weight="600" fill="#111" text-anchor="middle">Claude API</text>

  <!-- Phase 2 arrow to output -->
  <line x1="460" y1="251" x2="540" y2="251" stroke="#666" stroke-width="1.3" marker-end="url(#arrowhead)" />

  <!-- Phase 2 output box -->
  <rect x="550" y="228" width="145" height="46" rx="6" fill="#dff0df" stroke="#8db88d" stroke-width="1.4" />
  <text x="622" y="256" font-family="sans-serif" font-size="12" font-weight="600" fill="#111" text-anchor="middle">Markdown Report</text>

  <!-- Divider between phases -->
  <line x1="40" y1="175" x2="700" y2="175" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4" />
</svg>