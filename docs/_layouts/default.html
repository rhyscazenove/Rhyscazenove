<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
  {% feed_meta %}
</head>
<body>
  <div class="site-wrapper">
    {% include header.html %}
    <main class="site-content">
      {{ content }}
    </main>
    {% include footer.html %}
  </div>
  <script>
    (function() {
      var btn = document.getElementById('theme-toggle');
      var states = ['auto', 'light', 'dark'];
      var labels = { auto: 'auto', light: 'light', dark: 'dark' };

      function current() {
        return document.documentElement.getAttribute('data-theme') || 'auto';
      }

      function isDark() {
        var theme = current();
        if (theme === 'dark') return true;
        if (theme === 'light') return false;
        return window.matchMedia('(prefers-color-scheme: dark)').matches;
      }

      function apply(theme) {
        if (theme === 'auto') {
          document.documentElement.removeAttribute('data-theme');
          localStorage.removeItem('theme');
        } else {
          document.documentElement.setAttribute('data-theme', theme);
          localStorage.setItem('theme', theme);
        }
        btn.textContent = labels[theme];
        if (window.mermaid) {
          mermaid.initialize({
            startOnLoad: false,
            theme: isDark() ? 'dark' : 'default',
            themeVariables: isDark()
              ? { primaryColor: '#2a2a2a', primaryTextColor: '#ede8e0', lineColor: '#999' }
              : { primaryColor: '#f0ede8', primaryTextColor: '#111', lineColor: '#888' }
          });
          document.querySelectorAll('.mermaid[data-processed]').forEach(function(el) {
            el.removeAttribute('data-processed');
            el.innerHTML = el.getAttribute('data-original');
          });
          mermaid.run();
        }
      }

      btn.addEventListener('click', function() {
        var i = states.indexOf(current());
        apply(states[(i + 1) % states.length]);
      });

      apply(current());
    })();
  </script>
  <script>
    (function() {
      var codeBlocks = document.querySelectorAll('pre code.language-mermaid');
      if (!codeBlocks.length) return;

      codeBlocks.forEach(function(code) {
        var pre = code.parentElement;
        var div = document.createElement('div');
        div.className = 'mermaid';
        div.setAttribute('data-original', code.textContent);
        div.textContent = code.textContent;
        pre.parentElement.replaceChild(div, pre);
      });

      var theme = document.documentElement.getAttribute('data-theme') || 'auto';
      var dark = theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);

      var script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js';
      script.onload = function() {
        mermaid.initialize({
          startOnLoad: true,
          theme: dark ? 'dark' : 'default',
          themeVariables: dark
            ? { primaryColor: '#2a2a2a', primaryTextColor: '#ede8e0', lineColor: '#999' }
            : { primaryColor: '#f0ede8', primaryTextColor: '#111', lineColor: '#888' }
        });
      };
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
