---
layout: default
---

<article>
  <div class="post-header">
    <div class="post-meta">{{ page.date | date: "%d %b %Y" }}</div>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p>{{ page.description }}</p>
    {% endif %}
    {% if page.tags.size > 0 %}
    <div class="post-tags">
      {% for tag in page.tags %}
      <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </div>
  <hr>
  <div class="post-content">
    {{ content }}
  </div>
</article>
